name: Run main.go

on:
  push:
    branches:
      - main
      - master

jobs:
  generate-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
      
      - name: Run main.go
        working-directory: ${{ github.workspace }}
        env:
          CONTENT_ROOT: ${{ github.workspace }}/posts
        run: go run scripts/main.go
      
      - name: Check for changes
        id: verify-changed-files
        working-directory: ${{ github.workspace }}
        run: |
          echo "Checking git status..."
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.verify-changed-files.outputs.changed == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          echo "Checking which files exist and their status..."
          ls -la index.json tag_index.json 2>/dev/null || echo "Some files may not exist yet"
          echo "Current git status:"
          git status
          echo "Adding all changes..."
          git add -A
          echo "Files staged. Status:"
          git status
          git commit -m "Auto-generate index files [skip ci]" || exit 0
          git push
